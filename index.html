<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia - Seleção de Serviços</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Barbearia do Roseira</h1>
        <p>Selecione os serviços desejados:</p>
    </header>

    <main class="container">
        <div class="card">
            <h3>Corte</h3>
            <p>R$ <span class="preco">35.00</span></p>
            <button class="btn-adicionar">Adicionar</button>
        </div>

        <div class="card">
            <h3>Barba</h3>
            <p>R$ <span class="preco">25.00</span></p>
            <button class="btn-adicionar">Adicionar</button>
        </div>

        <div class="card">
            <h3>Sobrancelha</h3>
            <p>R$ <span class="preco">15.00</span></p>
            <button class="btn-adicionar">Adicionar</button>
        </div>
    </main>

    <footer class="totalizador">
        <h2>Total: R$ <span id="valor-total">0.00</span></h2>
    </footer>

    <script src="main.js"></script>
</body>
</html>
